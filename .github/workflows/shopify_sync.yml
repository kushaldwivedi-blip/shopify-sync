name: Shopify Sync

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Run Shopify Export
        run: python shopify_export.py

      - name: Save CSV
        uses: actions/upload-artifact@v4
        with:
          name: shopify-orders
          path: shopify_orders.csv
          retention-days: 7
